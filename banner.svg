<svg width="1000" height="240" viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1a2129" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- outer frame -->
  <rect x="0" y="0" width="1000" height="240" rx="10" fill="#0D1117"/>
  <rect x="0" y="0" width="1000" height="240" rx="10" fill="url(#grid)"/>
  <rect x="0" y="0" width="1000" height="240" rx="10" fill="url(#fade)"/>
  <rect x="1" y="1" width="998" height="238" rx="9" fill="none" stroke="#9FEF00" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="0" y="0" width="1000" height="34" rx="10" fill="#11161d"/>
  <rect x="0" y="24" width="1000" height="10" fill="#11161d"/>
  <line x1="0" y1="34" x2="1000" y2="34" stroke="#232b34" stroke-width="1"/>

  <circle cx="24" cy="17" r="6" fill="#FF5F56"/>
  <circle cx="46" cy="17" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="17" r="6" fill="#27C93F"/>

  <text x="500" y="21" text-anchor="middle" font-family="'Fira Code', 'Consolas', monospace" font-size="12" fill="#5a6472">rachit@devsecops: ~/profile — bash</text>

  <!-- prompt line -->
  <text x="40" y="80" font-family="'Fira Code', 'Consolas', monospace" font-size="16" fill="#5a6472">guest@rachit-agarwal:~$ <tspan fill="#9FEF00">whoami</tspan></text>

  <!-- main name -->
  <text x="40" y="140" font-family="'Fira Code', 'Consolas', monospace" font-size="52" font-weight="700" fill="#9FEF00" letter-spacing="1">RACHIT AGARWAL</text>

  <!-- subtitle -->
  <text x="40" y="172" font-family="'Fira Code', 'Consolas', monospace" font-size="17" fill="#c9f7a8">Associate Software Engineer <tspan fill="#5a6472">|</tspan> Security Enthusiast</text>

  <!-- secondary prompt / cursor -->
  <text x="40" y="205" font-family="'Fira Code', 'Consolas', monospace" font-size="15" fill="#5a6472">guest@rachit-agarwal:~$ <tspan fill="#8b98a5">_</tspan>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.2s" repeatCount="indefinite"/>
  </text>
</svg>
